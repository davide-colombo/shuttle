# shuttle project configuration
# Copy this file to your project root as .shuttle.conf
# Profiles define named transfer configurations.
# The [default] profile is used when no --profile flag is given.

[default]
remote_root = /path/to/remote/project
# local_root defaults to the directory containing this file
# local_root = .
# direction = both
# delete = no
# verify = no
# follow_links = no
# exclude = .git/
# exclude = __pycache__/
# exclude = .DS_Store
# include = pattern
# rsync_flags =

# Example: named profile for large binary files
# [bam]
# remote_root = /path/to/remote/bam/storage
# local_root = ./data/bam
# direction = down
# verify = yes
# exclude = *.unsorted.bam
